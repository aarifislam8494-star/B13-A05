<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issuee</title>
    <link rel="stylesheet" href="style.css">
    
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="font-gheist">
     <!-- navbar -->
    <div class="navbar flex justify-between mx-auto bg-base-100 shadow-sm">
        <div class="sm:flex items-center sm:gap-[15px]">
            <img class="w-[36px]" src="assets/github-logo.png" alt="">
            <p class="font-semibold text-[17px]">GitHub Issues Tracker</p>
        </div>
        <div class="flex gap-5">
            <input type="search" placeholder="Search Issues.." class="p-[10px] border-gray-300 rounded-sm w-[300px]">
            <button class="btn btn-primary h-[44px] btn-new">+ New Issues</button>
        </div>

    </div>

    <!-- btn section -->

    <section
        class="mt-[60px] bg-white shadow-[0_4px_10px_rgba(0,0,0,0.1)] p-[24px] max-w-[1300px] mx-auto rounded flex gap-[8px]">
        <button id="allbtn" class="w-[120px] btn btn-primary">All</button>
        <button id="openBtn" class="btn w-[120px] btn-outline">Open</button>
         <button id="closeBtn" class="btn w-[120px] btn-outline">Closed</button>
    </section>

    <section
        class="flex justify-between mt-[16px] bg-white shadow-[0_4px_10px_rgba(0,0,0,0.1)] p-[24px] max-w-[1300px] mx-auto rounded ">
        <div class="flex gap-4">
            <img class="w-[50px] h-[50px]" src="assets/Aperture.png" alt="">
            <div>
                 <h4 class="font-semibold text-[19px]"><span id="totalCount"></span> Issues</h4>
                <p class="text-[#64748B]">Track and manage your project issues</p>
            </div>
        </div>
        <div class="flex text-center items-center gap-[10px]">
            <span class="w-3 h-3 rounded-full bg-green-500 inline-block"></span>
            <p>Open</p>
            <span id="closedCount" class="w-3 h-3 rounded-full bg-purple-400 inline-block"></span>
            <p>Close</p>
        </div>
    </section>

    <!--data from api -->
     <section id="cardContainer"
        class="mt-[25px] mx-auto max-w-[1300px] grid grid-cols-1 sm:grid-cols-1 lg:grid-cols-2 xl:grid-cols-4 gap-[25px]  p-[27px] bg-white shadow-[0_4px_10px_rgba(0,0,0,0.1)]">
     </section>


    <div id="loadingSpinner" class="flex justify-center items-center h-[60vh] hidden">
        <span class="flex items-center loading loading-dots loading-xl"></span>
    </div>

    
</body>

<script src="issues.js"></script>
</html>
